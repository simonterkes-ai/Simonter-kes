<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simonterkes Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: url('https://drive.google.com/uc?export=view&id=1M_LSVPn1tscOffeG6I6wZfmd3qbBlO5q') no-repeat center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      margin: 10px 0;
    }

    p {
      color: #e2e8f0;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .left {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .footer {
      color: #e2e8f0;
      font-size: 12px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->
  <img src="https://drive.google.com/uc?export=view&id=1bkhGTcA-UsoUptzIZNNNqkFEEurXqytG" class="logo">

  <h1>Dinas Kesehatan Kab. Sigi</h1>
  <p>Sistem Monitoring & Perencanaan (Simonterkes)</p>

  <!-- MENU -->
  <a href="https://docs.google.com/spreadsheets/d/1uAvLcHHPIEE90eYo2Glb-yQfopp88z4euRZwfoH2lP8/edit?gid=1595741466" target="_blank">
    <div class="card">
      <div class="left">📊 Rekap Monev</div>
      <div>→</div>
    </div>
  </a>

  <a href="https://script.google.com/macros/s/AKfycbzqD-6nsYvFkz5htZ76xPcS8HQ9ULeVLS5bYWhEjgKKTVhyaJcIeGlYzw0zrXId4fbUIA/exec" target="_blank">
    <div class="card">
      <div class="left">🌐 Dashboard Arsip Data</div>
      <div>→</div>
    </div>
  </a>

  <div class="footer">
    © Dinas Kesehatan Kab. Sigi
  </div>

</div>

</body>
</html>
