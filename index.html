<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simonterkes Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: url('bg.jpg') no-repeat center center;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    /* LOGO */
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .logo {
      width: 65px;
      background: white;
      padding: 6px;
      border-radius: 10px;
    }

    h1 {
      color: white;
      margin: 10px 0;
      font-size: 22px;
    }

    p {
      color: #e2e8f0;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      font-weight: 500;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .footer {
      color: #e2e8f0;
      font-size: 12px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="logo-sigi.png" class="logo">
    <img src="logo-kemenkes.png" class="logo">
  </div>

  <h1>Dinas Kesehatan Kab. Sigi</h1>
  <p>Sistem Monitoring & Perencanaan Kesehatan (Simonterkes)</p>

  <a href="https://docs.google.com/spreadsheets/d/1uAvLcHHPIEE90eYo2Glb-yQfopp88z4euRZwfoH2lP8/edit?gid=1595741466" target="_blank">
    <div class="card">
      📊 Rekap Monitoring & Evaluasi
      <span>→</span>
    </div>
  </a>

  <a href="https://script.google.com/macros/s/AKfycbzqD-6nsYvFkz5htZ76xPcS8HQ9ULeVLS5bYWhEjgKKTVhyaJcIeGlYzw0zrXId4fbUIA/exec" target="_blank">
    <div class="card">
      🌐 Dashboard Arsip Data
      <span>→</span>
    </div>
  </a>

  <div class="footer">
    © Dinas Kesehatan Kabupaten Sigi
  </div>

</div>

</body>
</html>
